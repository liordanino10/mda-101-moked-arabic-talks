<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0D1F2D">
<title>ערבית רפואית — מד"א 101</title>
<link rel="manifest" href="manifest.json">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --navy: #0D1F2D;
  --red:  #C8102E;
  --ar:   #0D4A6B;
  --bg:   #F0F4F6;
  --card: #FFFFFF;
  --border: #D0DCE2;
  --tr:   #5A6E7A;
}

html, body {
  height: 100%;
  font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  background: var(--bg);
  color: var(--navy);
  overscroll-behavior: none;
}

/* ── HEADER ── */
.header {
  background: var(--navy);
  padding: 12px 14px 10px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.badge {
  background: var(--red);
  color: #fff;
  font-size: 11px;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}
.header h1 {
  font-size: 15px;
  font-weight: 700;
  color: #fff;
}

/* ── SEARCH BOX ── */
.search-wrap {
  position: relative;
}
.search-box {
  width: 100%;
  padding: 11px 40px 11px 14px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #1A3346;
  color: #fff;
  outline: none;
  direction: rtl;
}
.search-box::placeholder { color: #6A8A9A; }
.clear-btn {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #6A8A9A;
  font-size: 18px;
  cursor: pointer;
  display: none;
  padding: 4px;
}

/* ── RESULTS COUNT ── */
.results-bar {
  padding: 8px 14px 4px;
  font-size: 12px;
  color: var(--tr);
  min-height: 28px;
}

/* ── CARDS ── */
.list {
  padding: 0 10px 80px;
}
.card {
  background: var(--card);
  border-radius: 10px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.card-he {
  padding: 10px 12px 6px;
  font-size: 15px;
  font-weight: 600;
  color: var(--navy);
  border-bottom: 1px solid var(--border);
}
.card-bottom {
  display: flex;
  align-items: center;
  padding: 8px 8px 8px 12px;
  gap: 8px;
}
.card-ar {
  flex: 1;
  font-size: 17px;
  font-weight: 700;
  color: var(--ar);
  direction: rtl;
  line-height: 1.4;
}
.card-tr {
  font-size: 12px;
  color: var(--tr);
  font-style: italic;
  padding: 0 12px 8px;
}

/* ── SPEAK BUTTON ── */
.speak-btn {
  flex-shrink: 0;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid var(--ar);
  background: none;
  color: var(--ar);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, color .15s;
}
.speak-btn.playing {
  background: var(--ar);
  color: #fff;
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--tr);
}
.empty .icon { font-size: 40px; margin-bottom: 12px; }
.empty p { font-size: 15px; }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--red);
  letter-spacing: 0.5px;
  padding: 14px 12px 4px;
  text-transform: uppercase;
}

/* ── INITIAL STATE (no search) ── */
.sections-nav {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.section-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  text-align: right;
  font-size: 15px;
  font-weight: 600;
  color: var(--navy);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
}
.section-btn .arrow { color: var(--tr); font-size: 13px; }
.section-btn .count { font-size: 12px; color: var(--tr); font-weight: 400; }

/* ── SECTION VIEW ── */
.back-btn {
  background: none;
  border: none;
  color: #8AAABB;
  font-size: 13px;
  padding: 8px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  width: 100%;
  text-align: right;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="badge">101</span>
    <h1>ערבית רפואית מדוברת</h1>
  </div>
  <div class="search-wrap">
    <input class="search-box" id="search" type="search" placeholder="חיפוש בעברית... (כאב, נשימה, מיקום...)" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="results-bar" id="resultsBar"></div>
<div id="mainContent"></div>

<!-- Hidden audio for TTS -->
<audio id="ttsAudio"></audio>

// Flatten all phrases with section info
const ALL = [];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let currentAudio = null;
let currentBtn   = null;
let activeSection = null; // null = home

// ═══════════════════════════════════════
// TTS — Google Translate via new tab trick
// Since we're on file://, we open a mini popup that auto-closes
// ═══════════════════════════════════════
function ttsUrl(text) {
  return 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=ar&q=' + encodeURIComponent(text);
}

function playAr(text, btn) {
  // Stop current
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  if (currentBtn && currentBtn !== btn) {
    currentBtn.classList.remove('playing');
    currentBtn.textContent = '🔊';
  }

  // Toggle off
  if (currentBtn === btn) {
    currentBtn.classList.remove('playing');
    currentBtn.textContent = '🔊';
    currentBtn = null;
    return;
  }

  btn.classList.add('playing');
  btn.textContent = '⏹';
  currentBtn = btn;

  const audio = new Audio(ttsUrl(text));
  currentAudio = audio;

  audio.onended = () => {
    btn.classList.remove('playing');
    btn.textContent = '🔊';
    if (currentBtn === btn) currentBtn = null;
    currentAudio = null;
  };
  audio.onerror = () => {
    // Fallback: open in background tab
    btn.classList.remove('playing');
    btn.textContent = '🔊';
    if (currentBtn === btn) currentBtn = null;
    currentAudio = null;
    window.open(ttsUrl(text), '_blank');
  };

  audio.play().catch(() => {
    btn.classList.remove('playing');
    btn.textContent = '🔊';
    currentBtn = null;
    currentAudio = null;
    window.open(ttsUrl(text), '_blank');
  });
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function phraseCard(p, showSection) {
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    ${showSection ? `<div class="section-label">${p.section}</div>` : ''}
    <div class="card-he">${p.he}</div>
    <div class="card-bottom">
      <div class="card-ar">${p.ar}</div>
      <button class="speak-btn" aria-label="השמע">🔊</button>
    </div>
    <div class="card-tr">${p.tr}</div>
  `;
  div.querySelector('.speak-btn').addEventListener('click', function() {
    playAr(p.ar, this);
  });
  return div;
}

function renderHome() {
  activeSection = null;
  document.getElementById('resultsBar').textContent = '';
  const c = document.getElementById('mainContent');
  c.innerHTML = '';
  const nav = document.createElement('div');
  nav.className = 'sections-nav';
  SECTIONS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'section-btn';
    btn.innerHTML = `<span>${s.name}</span><span><span class="count">${s.phrases.length} משפטים</span> ›</span>`;
    btn.addEventListener('click', () => renderSection(s));
    nav.appendChild(btn);
  });
  c.appendChild(nav);
}

function renderSection(s) {
  activeSection = s;
  document.getElementById('resultsBar').textContent = '';
  const c = document.getElementById('mainContent');
  c.innerHTML = '';

  const back = document.createElement('button');
  back.className = 'back-btn';
  back.innerHTML = '‹ חזרה לרשימה';
  back.addEventListener('click', () => {
    document.getElementById('search').value = '';
    document.getElementById('clearBtn').style.display = 'none';
    renderHome();
  });
  c.appendChild(back);

  const list = document.createElement('div');
  list.className = 'list';
  s.phrases.forEach(p => list.appendChild(phraseCard(p, false)));
  c.appendChild(list);
}

function renderSearch(q) {
  const results = ALL.filter(p => p.he.includes(q));
  document.getElementById('resultsBar').textContent =
    results.length ? `${results.length} תוצאות` : 'לא נמצא';

  const c = document.getElementById('mainContent');
  c.innerHTML = '';

  if (results.length === 0) {
    c.innerHTML = `<div class="empty"><div class="icon">🔍</div><p>לא נמצאו משפטים עם "<strong>${q}</strong>"</p></div>`;
    return;
  }

  const list = document.createElement('div');
  list.className = 'list';
  results.forEach(p => list.appendChild(phraseCard(p, true)));
  c.appendChild(list);
}

// ═══════════════════════════════════════
// SEARCH INPUT
// ═══════════════════════════════════════
const searchEl  = document.getElementById('search');
const clearBtn  = document.getElementById('clearBtn');

searchEl.addEventListener('input', () => {
  const q = searchEl.value.trim();
  clearBtn.style.display = q ? 'block' : 'none';
  if (q.length === 0) {
    activeSection ? renderSection(activeSection) : renderHome();
  } else {
    renderSearch(q);
  }
});

function clearSearch() {
  searchEl.value = '';
  clearBtn.style.display = 'none';
  searchEl.focus();
  activeSection ? renderSection(activeSection) : renderHome();
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
renderHome();
